<!DOCTYPE html>
<html lang="en">
<head>
  <script src="https://unpkg.com/lucide@latest"></script>
  <meta charset="UTF-8">
  <title>AHP - Sign In</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="login-container">

    <div class="left-panel">

      <img src="https://www.liblogo.com/img-logo/un1777u181-universidad-tecmilenio-logo-universidad-tecmilenio-badges-credly.png" class="logo">

      <h2>Sign in</h2>

<div class="input-group">
  <i data-lucide="mail" class="input-icon"></i>
  <input id="email" type="email" placeholder="e-mail">
</div>
<div class="input-group">
  <i data-lucide="lock" class="input-icon"></i>
  <input id="password" type="password" placeholder="password">
</div>
        <button type="button" class="submit-btn" onclick="login()">
  Sign in
</button>

      <p class="small-text">
        Don't have an account?
      </p>

      <p class="create-account" onclick="location.href='create-account.html'">
        Crear cuenta nueva
      </p>

    </div>

    <div class="right-panel">
      <div class="maps-card">MAPS</div>
      <div class="tag">El nuevo</div>
      <div class="tag">modelo educativo</div>
      <div class="tag arrow">para ti →</div>
    </div>

  </div>
<script> lucide.createIcons()</script>
<script>
async function login() {
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;
  if (!email || !password) {
    alert('Please enter email and password');
    return;
  }
  try {
    const res = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ correo: email, password })
    });
    const data = await res.json();
    if (res.ok) {
      window.location.href = 'dashboard.html';
    } else {
      alert(data.error || 'Login failed');
    }
  } catch (err) {
    console.error(err);
    alert('Network error');
  }
}
</script>
</body>
</html>
